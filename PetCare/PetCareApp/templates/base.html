<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}PetCare{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <div class="profile-top-left">
        <a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">
            <i class="fa-solid fa-user"></i>&nbsp {{ user.username }}
        </a>
        <a href="/cart/"><i class="fa-solid fa-cart-shopping cart-icon"></i></a>
    </div>
    {% endif %}

    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрација</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-center {
            width: 100%;
            max-width: 520px;
            text-align: center;
        }
        .register-center h3 {
            font-size: 2.3rem;
            font-weight: 700;
            margin-bottom: 32px;
            color: #185a9d;
        }
        .register-center .form-label,
        .register-center label {
            font-size: 1.15em;
            font-weight: 600;
        }
        .register-center .form-control {
            font-size: 1.15em;
            padding: 0.75rem 1rem;
            margin-bottom: 18px;
        }
        .register-center .btn {
            font-size: 1.2em;
            padding: 0.75rem 0;
            border-radius: 30px;
        }
        .register-center .mt-3 {
            margin-top: 1.5rem !important;
        }
    </style>
</head>
<body>
    <div class="register-center mx-auto">
        <h3>Регистрација</h3>
        <form method="post" class="mb-3">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-2">Регистрирајте се</button>
        </form>
        <div class="mt-3">
            <a href="/accounts/login/">Веќе имате сметка? Најавете се</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
